<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Adaptive Tutor</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Courier New", Courier, monospace;
        background: #f7f4ef;
        color: #1c1c1c;
      }
      .wrap {
        max-width: 860px;
        margin: 32px auto;
        padding: 0 20px 40px;
      }
      h1 {
        font-size: 28px;
        margin-bottom: 6px;
      }
      p {
        margin-top: 0;
      }
      label {
        display: block;
        font-size: 13px;
        margin: 14px 0 6px;
      }
      input,
      textarea {
        width: 100%;
        font-family: inherit;
        font-size: 14px;
        padding: 10px;
        border: 1px solid #c7c2bb;
        border-radius: 6px;
        background: #fffefb;
        box-sizing: border-box;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      .row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }
      button {
        margin-top: 16px;
        padding: 10px 16px;
        font-size: 14px;
        border: 1px solid #1c1c1c;
        border-radius: 999px;
        background: #1c1c1c;
        color: #fffefb;
        cursor: pointer;
      }
      button[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .panel {
        margin-top: 20px;
        padding: 14px;
        border: 1px dashed #b3ada5;
        border-radius: 8px;
        background: #fff;
        white-space: pre-wrap;
      }
      .meta {
        font-size: 12px;
        color: #6b665e;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Adaptive Tutor</h1>

      <form id="tutor-form">
        <div class="row">
          <div>
            <label for="user-id">User ID</label>
            <input id="user-id" name="user_id" value="user-123" required />
          </div>
          <div>
            <label for="conversation-id">Conversation ID (optional)</label>
            <input id="conversation-id" name="conversation_id" placeholder="leave blank for new" />
          </div>
        </div>

        <label for="question-text">Question</label>
        <textarea id="question-text" name="question_text" required>What is backpropogation?</textarea>

        <button id="submit-button" type="submit">Ask tutor</button>
      </form>

      <div id="status" class="panel">Ready.</div>
      <div id="response" class="panel"></div>
    </div>

    <script>
      const form = document.getElementById("tutor-form");
      const statusEl = document.getElementById("status");
      const responseEl = document.getElementById("response");
      const submitButton = document.getElementById("submit-button");

      function setStatus(text) {
        statusEl.textContent = text;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        responseEl.textContent = "";
        submitButton.disabled = true;
        setStatus("Asking...");

        const data = {
          user_id: form.user_id.value.trim(),
          question_text: form.question_text.value.trim(),
        };
        if (form.conversation_id.value.trim()) {
          data.conversation_id = form.conversation_id.value.trim();
        }

        try {
          const resp = await fetch("/api/tutor/respond", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          const payload = await resp.json();
          if (!resp.ok) {
            setStatus(`Error ${resp.status}`);
            responseEl.textContent = JSON.stringify(payload, null, 2);
            return;
          }

          if (payload.conversation_id) {
            form.conversation_id.value = payload.conversation_id;
          }
          setStatus(`Turn ${payload.turn_index}`);
          responseEl.textContent = payload.tutor_response || "(empty response)";
        } catch (err) {
          setStatus("Request failed.");
          responseEl.textContent = err.toString();
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
