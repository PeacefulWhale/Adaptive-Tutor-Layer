<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Adaptive Tutor</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Courier New", Courier, monospace;
        background: #f7f4ef;
        color: #1c1c1c;
      }
      .wrap {
        max-width: 860px;
        margin: 32px auto;
        padding: 0 20px 40px;
      }
      h1 {
        font-size: 28px;
        margin-bottom: 6px;
      }
      p {
        margin-top: 0;
      }
      label {
        display: block;
        font-size: 13px;
        margin: 14px 0 6px;
      }
      input,
      textarea {
        width: 100%;
        font-family: inherit;
        font-size: 14px;
        padding: 10px;
        border: 1px solid #c7c2bb;
        border-radius: 6px;
        background: #fffefb;
        box-sizing: border-box;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      .row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }
      button {
        margin-top: 16px;
        padding: 10px 16px;
        font-size: 14px;
        border: 1px solid #1c1c1c;
        border-radius: 999px;
        background: #1c1c1c;
        color: #fffefb;
        cursor: pointer;
      }
      button[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .panel {
        margin-top: 20px;
        padding: 14px;
        border: 1px dashed #b3ada5;
        border-radius: 8px;
        background: #fff;
        white-space: pre-wrap;
      }
      .meta {
        font-size: 12px;
        color: #6b665e;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-top: 20px;
      }
      .tab-btn {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid #b3ada5;
        background: #fff;
        cursor: pointer;
        color:#1c1c1c;
      }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h1>Adaptive Tutor</h1>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" style="margin:0;background:#fff;color:#1c1c1c;border:1px solid #b3ada5;">Log out</button>
        </form>
      </div>

      <form id="tutor-form">
        <div class="row">
          <div>
            <label for="user-id">User ID</label>
            <input id="user-id" name="user_id" value="user-123" required />
          </div>
          <div>
            <label for="conversation-id">Conversation ID (optional)</label>
            <input id="conversation-id" name="conversation_id" placeholder="leave blank for new" />
          </div>
        </div>

        <label for="question-text">Question</label>
        <textarea id="question-text" name="question_text" required>What is backpropagation?</textarea>

        <button id="submit-button" type="submit">Ask tutor</button>
      </form>

      <div id="status" class="panel">Ready.</div>
      <div id="response" class="panel"></div>

      <div class="tabs">
        <button id="show-feedback" class="tab-btn" type="button">Open Feedback</button>
      </div>

      <form id="feedback-form" class="panel hidden">
        <div class="meta" id="feedback-meta">Provide feedback for the last response.</div>
        <div class="row">
          <div>
            <label for="rating-correctness">Correctness (1-5)</label>
            <input id="rating-correctness" name="rating_correctness" type="number" min="1" max="5" required />
          </div>
          <div>
            <label for="rating-helpfulness">Helpfulness (1-5)</label>
            <input id="rating-helpfulness" name="rating_helpfulness" type="number" min="1" max="5" required />
          </div>
          <div>
            <label for="rating-clarity">Clarity (1-5)</label>
            <input id="rating-clarity" name="rating_clarity" type="number" min="1" max="5" required />
          </div>
        </div>
        <label for="free-text">Comments (optional)</label>
        <textarea id="free-text" name="free_text" placeholder="Share details to help improve."></textarea>
        <button style="display: block; margin: 0 auto;" id="submit-feedback" type="submit">Submit Feedback</button>
      </form>
    </div>

    <script>
      const form = document.getElementById("tutor-form");
      const statusEl = document.getElementById("status");
      const responseEl = document.getElementById("response");
      const submitButton = document.getElementById("submit-button");
      const feedbackForm = document.getElementById("feedback-form");
      const showFeedbackBtn = document.getElementById("show-feedback");
      const feedbackMeta = document.getElementById("feedback-meta");

      let lastTurnId = null;
      let lastTurnIndex = null;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function showFeedbackPanel(turnIndex) {
        feedbackForm.classList.remove("hidden");
        showFeedbackBtn.textContent = "Close Feedback";
        feedbackMeta.textContent = turnIndex !== null && turnIndex !== undefined
          ? `Provide feedback for turn ${turnIndex}.`
          : "Provide feedback for the last response.";
      }

      function hideFeedbackPanel() {
        feedbackForm.classList.add("hidden");
        showFeedbackBtn.textContent = "Open Feedback";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        responseEl.textContent = "";
        submitButton.disabled = true;
        setStatus("Asking...");

        const data = {
          user_id: form.user_id.value.trim(),
          question_text: form.question_text.value.trim(),
        };
        if (form.conversation_id.value.trim()) {
          data.conversation_id = form.conversation_id.value.trim();
        }

        try {
          const resp = await fetch("/api/tutor/respond", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          const payload = await resp.json();
          if (!resp.ok) {
            if (resp.status === 409 && payload && payload.code === "feedback_required") {
              // Backend indicates feedback is required for the last turn
              lastTurnId = payload.last_turn_id || null;
              lastTurnIndex = payload.last_turn_index || null;
              alert("Feedback required before asking another question.");
              showFeedbackPanel(lastTurnIndex);
              setStatus(`Feedback required for turn ${lastTurnIndex}`);
            } else {
              setStatus(`Error ${resp.status}`);
              responseEl.textContent = JSON.stringify(payload, null, 2);
            }
            return;
          }

          if (payload.conversation_id) {
            form.conversation_id.value = payload.conversation_id;
          }
          lastTurnId = payload.turn_id || null;
          lastTurnIndex = payload.turn_index || null;
          setStatus(`Turn ${payload.turn_index}`);
          responseEl.textContent = payload.tutor_response || "(empty response)";
          // Make feedback panel accessible after a response
          showFeedbackPanel(payload.turn_index);
        } catch (err) {
          setStatus("Request failed.");
          responseEl.textContent = err.toString();
        } finally {
          submitButton.disabled = false;
        }
      });

      showFeedbackBtn.addEventListener("click", () => {
        if (feedbackForm.classList.contains("hidden")) {
          showFeedbackPanel(lastTurnIndex);
        } else {
          hideFeedbackPanel();
        }
      });

      feedbackForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!lastTurnId) {
          alert("No recent turn to provide feedback for.");
          return;
        }
        const payload = {
          user_id: form.user_id.value.trim(),
          rating_correctness: parseInt(feedbackForm.rating_correctness.value, 10),
          rating_helpfulness: parseInt(feedbackForm.rating_helpfulness.value, 10),
          rating_clarity: parseInt(feedbackForm.rating_clarity.value, 10),
          free_text: feedbackForm.free_text.value.trim() || null,
        };
        try {
          const resp = await fetch(`/api/turns/${lastTurnId}/feedback`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await resp.json();
          if (!resp.ok) {
            alert(`Failed to submit feedback (${resp.status}).`);
            console.warn(data);
            return;
          }
          alert("Feedback submitted. You can ask another question now.");
          setStatus(`Feedback submitted for turn ${lastTurnIndex}.`);
          hideFeedbackPanel();
        } catch (err) {
          alert("Feedback request failed.");
          console.error(err);
        }
      });
    </script>
  </body>
</html>
