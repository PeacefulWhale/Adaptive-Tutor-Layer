<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Adaptive Tutor Layer · Ninja Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at 20% 20%, rgba(89, 129, 255, 0.08), transparent 40%),
          radial-gradient(circle at 80% 0%, rgba(255, 114, 94, 0.08), transparent 35%),
          #05070f;
        color: #e9ecf5;
        min-height: 100vh;
      }
      h1 {
        margin: 0;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .shell {
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px clamp(16px, 4vw, 32px) 48px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        gap: 10px;
      }
      .muted {
        color: #8fa6d1;
        font-size: 13px;
      }
      .btn {
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.04);
        color: #fff;
        border-radius: 12px;
        padding: 10px 14px;
        font-weight: 600;
        letter-spacing: 0.3px;
        cursor: pointer;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .canvas {
        position: relative;
        width: 100%;
        min-height: 78vh;
        border-radius: 20px;
        overflow: hidden;
        background: linear-gradient(135deg, rgba(19, 30, 54, 0.9), rgba(9, 14, 28, 0.92));
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      }
      .stage {
        position: absolute;
        inset: 20px;
        border-radius: 16px;
      }
      .nodes-layer {
        position: absolute;
        inset: 0;
      }
      .node {
        position: absolute;
        min-width: 200px;
        max-width: 260px;
        padding: 14px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(4px);
      }
      .node h3 {
        margin: 0 0 6px;
        font-size: 14px;
        letter-spacing: 0.4px;
        text-transform: uppercase;
      }
      .node .body {
        font-size: 13px;
        color: #c7d4f2;
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .node::after {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 14px;
        pointer-events: none;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      }
      .node:active { cursor: grabbing; }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.2px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .legend {
        position: absolute;
        top: 14px;
        right: 16px;
        display: grid;
        gap: 6px;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 12px;
      }
      .mono {
        font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, monospace;
      }
      svg.paths {
        position: absolute;
        inset: 0;
        overflow: visible;
        pointer-events: none;
      }
      .edge {
        stroke-dasharray: 5 10;
        animation: dash 5s linear infinite;
        opacity: 0.85;
      }
      @keyframes dash {
        to {
          stroke-dashoffset: -200;
        }
      }
      .glow {
        filter: drop-shadow(0 0 6px rgba(111, 213, 255, 0.35));
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const snapshots = [
        {
          id: 'Student A · Misconception repair',
          student: {
            id: 'stud-14',
            persona: 'Confident-but-wrong',
            mastery: 0.42,
            topic: 'Backpropagation',
            difficulty: '2 / 5',
          },

          policy: {
            current: 'Socratic Probe v4',
            reason: ['Misconception detected', 'Adaptive beats baseline', 'Exploit mode'],
            qScore: 0.78,
          },

          bandit: {
            context: ['Topic=Backprop', 'State=Misconception', 'Goal=Concept repair'],
            picked_from: ['Socratic Probe v4', 'Guided Steps v2', 'Direct Explain v1'],
            selected: 'Socratic Probe v4',
          },

          policies: {
            candidates: [
              { name: 'Socratic Probe v4', weight: 0.62, mean_q: 0.78 },
              { name: 'Guided Steps v2', weight: 0.24, mean_q: 0.71 },
              { name: 'Direct Explain v1', weight: 0.14, mean_q: 0.66 },
            ],
            note: 'Bandit explores, then shifts traffic to the best policy for this student state.',
          },

          static_policy: {
            name: 'Static Tutor Prompt v0',
            note: 'Fixed “helpful tutor” prompt used as the control baseline.',
          },

          turn: {
            question: 'I think backprop just flips the sign of the derivative when going backward, right?',
            adaptive:
              'Let’s check that: when we backprop through a layer, what happens to the chain rule term for the activation? Is the sign always flipped or do we multiply by the downstream gradient?',
            baseline:
              'Backpropagation uses the chain rule to propagate errors backward through the network so weights can be updated.',
            breakdown: { delta: '+0.23 vs baseline' },
            flags: ['Check-for-understanding present', 'Avoided giving full solution'],
            prompts: {
              adaptive: 'Socratic Probe v4',
              baseline: 'Static Tutor Prompt v0',
            },
          },

          llm: {
            model: 'grok-2 (via LLM Service)',
            note: 'Same model. Different system prompt → different teaching behavior.',
          },

          qscore: {
            q: 0.78,
            delta_vs_baseline: 0.23,
            reward: 0.78,
            components: { correctness: 0.82, clarity: 0.77, pedagogy: 0.76 },
          },
        },
      ];

      const layout = {
        nodes: [
          // Student at bottom-center
          { id: 'student', label: 'Student Input', color: '#60A5FA', x: 52, y: 78 },

          // Adaptive policy selection stack (left)
          { id: 'bandit', label: 'Policy Selector (Bandit)', color: '#34D399', x: 17, y: 56 },
          { id: 'policies', label: 'Available Policies', color: '#93C5FD', x: 13, y: 70 },

          // Control prompt (mid)
          { id: 'static_policy', label: 'Static Policy (Control)', color: '#FB923C', x: 33, y: 40 },

          // Tutors (mid/right)
          { id: 'adaptive', label: 'Adaptive Tutor', color: '#2DD4BF', x: 63, y: 56 },
          { id: 'baseline', label: 'Baseline Tutor', color: '#FBBF24', x: 86, y: 34 },

          // Evaluator (top-center)
          { id: 'qscore', label: 'Q-score Evaluator', color: '#67E8F9', x: 66, y: 14 },

          // Shared model (top-left-ish)
          { id: 'llm', label: 'Language Model', color: '#F472B6', x: 16, y: 18 },
        ],
        edges: [
          // Student feeds both flows
          { from: 'student', to: 'bandit',        color: '#60A5FA', label: 'Student context' },
          { from: 'student', to: 'static_policy', color: '#FB923C', label: 'Control path' },

          // Bandit consults candidates
          { from: 'policies', to: 'bandit',       color: '#93C5FD', label: 'Policy candidates' },

          // LLM calls
          { from: 'bandit', to: 'llm',       color: '#34D399', label: 'Selected policy' },
          { from: 'static_policy', to: 'llm', color: '#FB923C', label: 'Fixed prompt' },

          // LLM returns outputs
          { from: 'llm', to: 'adaptive',          color: '#2DD4BF', label: 'Tutor response' },
          { from: 'llm', to: 'baseline',          color: '#FBBF24', label: 'Tutor response' },

          // Evaluation (both compared at Q-score)
          { from: 'adaptive', to: 'qscore',       color: '#67E8F9', label: 'Score adaptive' },
          // { from: 'baseline', to: 'qscore',       color: '#67E8F9', label: 'Score baseline' },

          // Learning loop
          { from: 'qscore', to: 'bandit',         color: '#67E8F9', label: 'Reward update' },
        ],
      };

      function pickPort(fromRect, toRect) {
        const fx = fromRect.x + fromRect.width / 2;
        const fy = fromRect.y + fromRect.height / 2;
        const tx = toRect.x + toRect.width / 2;
        const ty = toRect.y + toRect.height / 2;

        const dx = tx - fx;
        const dy = ty - fy;

        // Choose side based on dominant direction
        const horizontal = Math.abs(dx) >= Math.abs(dy);

        const from = horizontal
          ? (dx >= 0
              ? { x: fromRect.x + fromRect.width, y: fy }   // right
              : { x: fromRect.x, y: fy })                   // left
          : (dy >= 0
              ? { x: fx, y: fromRect.y + fromRect.height }  // bottom
              : { x: fx, y: fromRect.y });                  // top

        const to = horizontal
          ? (dx >= 0
              ? { x: toRect.x, y: ty }                      // left
              : { x: toRect.x + toRect.width, y: ty })      // right
          : (dy >= 0
              ? { x: tx, y: toRect.y }                      // top
              : { x: tx, y: toRect.y + toRect.height });    // bottom

        return { from, to, dx, dy };
      }

      function bezierPath(from, to) {
        const dx = to.x - from.x;
        const dy = to.y - from.y;

        // control points: mostly horizontal if dx dominates
        const c = Math.min(140, Math.max(70, Math.abs(dx) * 0.35));

        const c1 = { x: from.x + Math.sign(dx || 1) * c, y: from.y };
        const c2 = { x: to.x - Math.sign(dx || 1) * c, y: to.y };

        return `M ${from.x} ${from.y} C ${c1.x} ${c1.y} ${c2.x} ${c2.y} ${to.x} ${to.y}`;
      }

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }

      const StatusDot = ({ status }) => {
        const color = status === 'warn' ? '#ffd273' : status === 'alert' ? '#ff9b9b' : '#8be7c7';
        const label = status === 'warn' ? 'Warning' : status === 'alert' ? 'Alert' : 'Stable';
        return (
          <span className="badge" style={{ background: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}>
            <span style={{ color }}>●</span> {label}
          </span>
        );
      };

      const Node = ({ node, snapshot, register, selected, setSelected, onMouseDown }) => {
        let body = '';
        if (node.id === 'student') {
          body = snapshot.turn.question;
        } else if (node.id === 'bandit') {
          body = `${snapshot.policy.current} • ${snapshot.bandit.context.join(', ')}`;
        } else if (node.id === 'adaptive') {
          body = snapshot.turn.adaptive;
        } else if (node.id === 'baseline') {
          body = snapshot.turn.baseline;
        } else if (node.id === 'feedback') {
          body = snapshot.turn.flags.join(' · ');
        } else if (node.id === 'qscore') {
          body = `Q=${snapshot.policy.qScore.toFixed(2)} | Δ ${snapshot.turn.breakdown.delta}`;
        } else if (node.id === 'drift') {
          body = snapshot.drift.notes.join(' · ');
        } else if (node.id === 'evolution') {
          body = snapshot.timeline.find((e) => e.label.includes('GA'))?.detail || 'New candidate pending';
        }
        return (
          <div
            ref={(el) => register(node.id, el)}
            className="node"
            onMouseDown={(e) => onMouseDown(e, node.id)}
            onClick={() => setSelected(node.id)}
            style={{
              left: `${node.x}%`,
              top: `${node.y}%`,
              transform: 'translate(-50%, -50%)',
              borderColor: selected === node.id ? `${node.color}` : `${node.color}55`,
              boxShadow: selected === node.id
                ? `0 12px 40px ${node.color}55`
                : `0 10px 30px ${node.color}33`,
              cursor: 'grab',
              userSelect: 'none',
            }}
          >
            <h3 style={{ color: node.color }}>{node.label}</h3>
            <div className="body">{body}</div>
          </div>
        );
      };

      const Edge = ({ d, color }) => (
        <path
          d={d}
          fill="none"
          stroke={color}
          strokeWidth="2"
          strokeLinecap="round"
          vectorEffect="non-scaling-stroke"
          className="edge glow"
        />
      );

      const Legend = ({ snapshot }) => (
        <div className="legend">
          <div><strong>{snapshot.id}</strong></div>
          <div className="muted">Persona: {snapshot.student.persona}</div>
          <div className="muted">Topic: {snapshot.student.topic}</div>
          <div className="muted">Mastery: {Math.round(snapshot.student.mastery * 100)}%</div>
          <div className="muted">Policy: {snapshot.policy.current}</div>
          <div className="muted">Q-score: {snapshot.policy.qScore.toFixed(2)}</div>
        </div>
      );

      function App() {
        const [index, setIndex] = React.useState(0);
        const snapshot = snapshots[index];

        const next = () => setIndex((i) => (i + 1) % snapshots.length);
        const prev = () => setIndex((i) => (i - 1 + snapshots.length) % snapshots.length);

        // ✅ nodes are now state (so we can drag)
        const [nodesState, setNodesState] = React.useState(layout.nodes);

        // keep selection
        const [selected, setSelected] = React.useState(null);

        const stageRef = React.useRef(null);
        const nodeElsRef = React.useRef({}); // id -> HTMLElement
        const [rects, setRects] = React.useState({}); // id -> {x,y,width,height}
        const [paths, setPaths] = React.useState([]);

        const register = React.useCallback((id, el) => {
          if (el) nodeElsRef.current[id] = el;
          else delete nodeElsRef.current[id];
        }, []);

        // --- DRAG STATE ---
        const dragRef = React.useRef({
          active: false,
          id: null,
          // offsets from pointer -> node center in %
          offsetX: 0,
          offsetY: 0,
          pointerId: null,
        });

        const onMouseDown = React.useCallback((e, id) => {
          // only left click
          if (e.button !== 0) return;
          e.preventDefault();
          e.stopPropagation();

          setSelected(id);

          const stageEl = stageRef.current;
          if (!stageEl) return;

          const stageRect = stageEl.getBoundingClientRect();

          // current node pos in %
          const n = nodesState.find((x) => x.id === id);
          if (!n) return;

          const px = e.clientX - stageRect.left;
          const py = e.clientY - stageRect.top;

          const mouseXpct = (px / stageRect.width) * 100;
          const mouseYpct = (py / stageRect.height) * 100;

          dragRef.current.active = true;
          dragRef.current.id = id;
          dragRef.current.offsetX = n.x - mouseXpct;
          dragRef.current.offsetY = n.y - mouseYpct;

          window.addEventListener("mousemove", onMouseMove);
          window.addEventListener("mouseup", onMouseUp);
        }, [nodesState]);

        const onMouseMove = React.useCallback((e) => {
          if (!dragRef.current.active) return;

          const stageEl = stageRef.current;
          if (!stageEl) return;

          const stageRect = stageEl.getBoundingClientRect();

          const px = e.clientX - stageRect.left;
          const py = e.clientY - stageRect.top;

          let x = (px / stageRect.width) * 100 + dragRef.current.offsetX;
          let y = (py / stageRect.height) * 100 + dragRef.current.offsetY;

          // keep inside stage; because we center nodes, keep some margin
          x = clamp(x, 6, 94);
          y = clamp(y, 8, 92);

          const id = dragRef.current.id;
          setNodesState((prev) =>
            prev.map((n) => (n.id === id ? { ...n, x, y } : n))
          );
        }, []);

        const onMouseUp = React.useCallback(() => {
          dragRef.current.active = false;
          dragRef.current.id = null;
          window.removeEventListener("mousemove", onMouseMove);
          window.removeEventListener("mouseup", onMouseUp);
        }, [onMouseMove]);

        // click empty canvas to clear selection
        const onStageClick = () => setSelected(null);

        // --- MEASURE DOM RECTS (stage-relative) ---
        const measure = React.useCallback(() => {
          const stageEl = stageRef.current;
          if (!stageEl) return;

          const stageRect = stageEl.getBoundingClientRect();
          const nextRects = {};

          for (const n of nodesState) {
            const el = nodeElsRef.current[n.id];
            if (!el) continue;
            const r = el.getBoundingClientRect();
            nextRects[n.id] = {
              x: r.left - stageRect.left,
              y: r.top - stageRect.top,
              width: r.width,
              height: r.height,
            };
          }
          setRects(nextRects);
        }, [nodesState]);

        // re-measure on mount / snapshot changes / node moves
        React.useLayoutEffect(() => {
          measure();
          const raf = requestAnimationFrame(measure);
          return () => cancelAnimationFrame(raf);
        }, [index, nodesState, measure]);

        // measure on resize / font load
        React.useEffect(() => {
          const stageEl = stageRef.current;
          if (!stageEl) return;

          let rafId = null;
          const schedule = () => {
            if (rafId) cancelAnimationFrame(rafId);
            rafId = requestAnimationFrame(measure);
          };

          window.addEventListener("resize", schedule);

          const ro = new ResizeObserver(schedule);
          ro.observe(stageEl);
          Object.values(nodeElsRef.current).forEach((el) => el && ro.observe(el));

          if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(schedule).catch(() => {});
          }

          return () => {
            window.removeEventListener("resize", schedule);
            ro.disconnect();
            if (rafId) cancelAnimationFrame(rafId);
          };
        }, [measure]);

        // --- COMPUTE PATHS ---
        const computePaths = React.useCallback(() => {
          const nextPaths = [];

          for (const e of layout.edges) {
            const a = rects[e.from];
            const b = rects[e.to];
            if (!a || !b) continue;

            const { from, to } = pickPort(a, b);
            const d = bezierPath(from, to);

            nextPaths.push({
              key: `${e.from}-${e.to}`,
              d,
              color: e.color,
              label: e.label,
            });
          }
          setPaths(nextPaths);
        }, [rects]);

        React.useEffect(() => {
          computePaths();
        }, [computePaths]);

        return (
          <div className="shell">
            <div className="topbar">
              <div>
                <div className="muted">Adaptive Tutor Layer · Ninja Panel</div>
                <h1>{snapshot.id}</h1>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn" onClick={prev}>◀ Previous</button>
                <button className="btn" onClick={next}>Next ▶</button>
              </div>
            </div>

            <div className="canvas">
              <Legend snapshot={snapshot} />

              <div className="stage" ref={stageRef} onMouseDown={onStageClick}>
                <svg className="paths" width="100%" height="100%">
                  {paths.map((p) => (
                    <Edge key={p.key} d={p.d} color={p.color} />
                  ))}
                </svg>

                <div className="nodes-layer">
                  {nodesState.map((node) => (
                    <Node
                      key={node.id}
                      node={node}
                      snapshot={snapshot}
                      register={register}
                      selected={selected}
                      setSelected={setSelected}
                      onMouseDown={onMouseDown}
                    />
                  ))}
                </div>
              </div>

              <div style={{ position: 'absolute', bottom: 12, left: 16, right: 16, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {snapshot.policy.reason.map((r) => (
                  <span className="badge" key={r}>{r}</span>
                ))}
                {snapshot.drift?.status && <StatusDot status={snapshot.drift.status} />}
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
